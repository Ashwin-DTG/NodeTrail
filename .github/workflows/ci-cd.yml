name: Node.js Kafka Microservices CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kafka-end-to-end:
    runs-on: ubuntu-latest

    services:
      zookeeper:
        image: wurstmeister/zookeeper:3.4.6
        ports:
          - 2181:2181

      kafka:
        image: wurstmeister/kafka:2.13-2.7.0
        env:
          KAFKA_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Start Consumers in Background
        run: |
          # Start all microservices/consumers in the background
          node producer-consumer.js & # this file should include all 5 consumers + producer
          sleep 5

      - name: Start Express API
        run: |
          node api-server.js & # your Express API serving /api/orders & SSE
          sleep 5

      - name: Send Test Order
        run: |
          node -e "
          const axios = require('axios');
          axios.post('http://localhost:3000/api/orders', { userId: 1, productId: 101, quantity: 1 })
            .then(res => console.log('✅ Test Order Placed:', res.data))
            .catch(err => console.error('❌ Test Order Failed', err));
          "
          
      - name: Wait for Kafka Events to Process
        run: sleep 10

      - name: Show Logs
        run: echo "✅ Kafka microservices test finished. Check workflow logs for event flow."
